services:
  - type: web
    name: aalacomputer-web
    env: node
    plan: free
    buildCommand: |
      npm install
      npm run build
      ls -la dist/
    startCommand: node backend/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ENABLE_DB
        value: 1
    staticPublishPath: ./dist
    autoDeploy: true
    healthCheckPath: /api/ping